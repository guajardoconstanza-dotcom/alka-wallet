<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Dinero - Alke Wallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <h1>Alke Wallet</h1>
    </header>

    <main class="container mt-4">

        <section class="card p-3 mb-3">

            <h2>Enviar Dinero</h2>

            <form id="transferForm">

                <label for="contacto" class="form-label">
                    Contacto
                </label>

                <input type="text" id="contacto" class="form-control mb-3" required>

                <label for="montoTransferencia" class="form-label">
                    Monto
                </label>

                <input type="number" id="montoTransferencia" class="form-control mb-3" min="1" required>

                <button type="submit" class="btn btn-primary">
                    Enviar Dinero
                </button>

                <p id="mensajeTransferencia"></p>

            </form>

        </section>

        <section class="card p-3">

            <h3>Contactos Frecuentes</h3>

            <ul class="list-group">
                <li class="list-group-item">María González</li>
                <li class="list-group-item">Juan Pérez</li>
                <li class="list-group-item">Ana Torres</li>
            </ul>

            <a href="menu.html" class="d-block mt-3">
                Volver al menú
            </a>

        </section>

    </main>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"></script>

</body>

</html>
